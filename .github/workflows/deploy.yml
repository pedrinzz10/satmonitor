name: Deploy na Azure VM

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Rodar testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Rodar testes
        run: |
          chmod +x gradlew
          ./gradlew test --no-daemon

  deploy:
    name: Deploy na VM
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      statuses: write

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 20.122.186.91
          username: azureuser
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/satmonitor
            git fetch origin && git reset --hard origin/main
            docker compose --profile docker up --build -d
            docker compose --profile docker ps

      - name: Health check da API
        run: |
          echo "Aguardando API subir..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://20.122.186.91:8080/actuator/health || echo "000")
            echo "Tentativa $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "API respondendo com sucesso."
              exit 0
            fi
            sleep 10
          done
          echo "Health check falhou após 2 minutos."
          exit 1

      - name: Notificar falha no commit
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: '❌ Deploy falhou. Verifique os logs em: ' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId
            })
