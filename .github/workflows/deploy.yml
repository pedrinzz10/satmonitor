name: Deploy na Azure VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 20.122.186.91
          username: azureuser
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/satmonitor
            git pull origin main
            docker compose --profile docker up --build -d
            docker compose --profile docker ps
