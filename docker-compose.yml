# ── SatMonitor — Docker Compose ─────────────────────────────────
#
# Perfil dev  (H2 em memória — desenvolvimento local):
#   docker compose --profile dev up --build
#
# Perfil docker (App + PostgreSQL — nuvem / FIAP DevOps):
#   cp .env.example .env  →  preencher JWT_SECRET, POSTGRES_USER, POSTGRES_PASSWORD
#   docker compose --profile docker up --build -d
#
# Variáveis necessárias para perfil docker (.env):
#   JWT_SECRET, POSTGRES_USER, POSTGRES_PASSWORD, CORS_ALLOWED_ORIGINS

networks:
  satmonitor-net:
    driver: bridge

volumes:
  satmonitor-db-data:
    name: satmonitor-db-data

services:

  # ── perfil dev: H2 em memória (desenvolvimento local) ──────────────
  satmonitor-dev:
    build: .
    profiles: [dev]
    container_name: satmonitor-dev
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: satmonitor-dev-secret-local

  # ── perfil docker: PostgreSQL containerizado ────────────────────────
  satmonitor-db:
    image: postgres:16-alpine
    profiles: [docker]
    container_name: satmonitor-db-RM562312
    networks:
      - satmonitor-net
    volumes:
      - satmonitor-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: satmonitor
      POSTGRES_USER: ${POSTGRES_USER:-satuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-satuser} -d satmonitor"]
      interval: 10s
      timeout: 5s
      retries: 10

  satmonitor-app:
    build: .
    profiles: [docker]
    container_name: satmonitor-app-RM562312
    networks:
      - satmonitor-net
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      JWT_SECRET: ${JWT_SECRET}
      POSTGRES_URL: jdbc:postgresql://satmonitor-db:5432/satmonitor
      POSTGRES_USER: ${POSTGRES_USER:-satuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      satmonitor-db:
        condition: service_healthy
