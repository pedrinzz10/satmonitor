# ================================================================
# Perfil de PRODUÇÃO (Oracle FIAP)
# Ativar com: SPRING_PROFILES_ACTIVE=prod  (ou --spring.profiles.active=prod)
#
# Todas as credenciais vêm de variáveis de ambiente — nada sensível
# é versionado. Os ${...} sem default fazem a aplicação FALHAR no boot
# caso a variável não esteja definida (fail-fast intencional).
# ================================================================

# ── Oracle ──────────────────────────────────────────────────────
spring.datasource.url=${ORACLE_URL}
spring.datasource.username=${ORACLE_USER}
spring.datasource.password=${ORACLE_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ── JPA / Hibernate ─────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── JWT ─────────────────────────────────────────────────────────
# Sem fallback: se JWT_SECRET não estiver setado, a aplicação não sobe.
api.security.token.secret=${JWT_SECRET}

# ── Segurança ───────────────────────────────────────────────────
# Console H2 nunca habilitado em produção.
spring.h2.console.enabled=false

# ── Swagger ─────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
