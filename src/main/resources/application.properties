spring.application.name=satmonitor

# H2 local (trocar pelo Oracle FIAP no deploy)
spring.datasource.url=jdbc:h2:mem:satmonitor
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.h2.console.enabled=true

# JWT secret (trocar por variável de ambiente no deploy)
api.security.token.secret=satmonitor-dev-secret-local-2024

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html