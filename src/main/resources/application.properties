spring.application.name=satmonitor

# Datasource - H2 em memoria (perfil dev local)
spring.datasource.url=jdbc:h2:mem:satmonitor
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.h2.console.enabled=true

# Jackson - aceita enums sem distincao de maiusculas/minusculas
spring.jackson.mapper.accept-case-insensitive-enums=true

# JWT secret - usa variavel de ambiente em deploy; default apenas para dev local
api.security.token.secret=${JWT_SECRET:XkB9#mP2@nQ7-sM0n1t0r-vL4!wE6rT1-d3v}

# CORS - em producao definir: CORS_ALLOWED_ORIGINS=https://2tdspw-global-solution-1-satmonitor.vercel.app
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4200,http://localhost:8080}

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
