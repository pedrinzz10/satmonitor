spring.application.name=satmonitor

# H2 local (trocar pelo Oracle FIAP no deploy)
spring.datasource.url=jdbc:h2:mem:satmonitor
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.h2.console.enabled=true

# Jackson — aceita enums (ex.: tipo do sensor, status) sem distinção de maiúsculas/minúsculas
spring.jackson.mapper.accept-case-insensitive-enums=true

# JWT secret — usa variável de ambiente em deploy; default apenas para dev local
api.security.token.secret=${JWT_SECRET:XkB9#mP2@nQ7-sM0n1t0r-vL4!wE6rT1-d3v}

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html